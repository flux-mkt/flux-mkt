<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barbearia Gaúcho</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 15px 20px;
      background: #1c1c1c;
      align-items: center;
    }

    .logo {
      font-size: 20px;
      font-weight: bold;
      color: gold;
    }

    .btn {
      background: gold;
      color: black;
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    .hero {
      text-align: center;
      padding: 80px 20px;
      background: linear-gradient(135deg, #111, #333);
    }

    .hero h1 {
      font-size: 36px;
      margin-bottom: 10px;
    }

    .services {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .card {
      background: #1c1c1c;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
    }

    .card h3 {
      color: gold;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #111;
      color: #888;
    }
  </style>
</head>

<body>

  <header>
    <div class="logo">💈 Barbearia Gaúcho</div>
    <button class="btn">Agendar horário</button>
  </header>

  <section class="hero">
    <h1>Estilo e corte na régua ✂️</h1>
    <p>Os melhores cortes da cidade</p>
  </section>

  <section class="services">

    <div class="card">
      <h3>Corte masculino</h3>
      <p>R$ 25</p>
    </div>

    <div class="card">
      <h3>Barba</h3>
      <p>R$ 15</p>
    </div>

    <div class="card">
      <h3>Sobrancelha</h3>
      <p>R$ 10</p>
    </div>

  </section>

  <footer>
    © 2026 Barbearia Gaúcho
  </footer>

</body>
</html>
